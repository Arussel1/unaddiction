<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialFine — Dashboard</title>
  <meta name="description" content="View your SocialFine debt in real-time across devices.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0a0a14;
      --surface:     #12122a;
      --surface-alt: #1a1a3a;
      --border:      rgba(255,255,255,0.06);
      --text:        #e8e8f0;
      --text-muted:  #7777aa;
      --accent:      #667eea;
      --accent-glow: rgba(102,126,234,0.3);
      --danger:      #ff6b6b;
      --success:     #51cf66;
      --warning:     #ffa500;
      --radius:      16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      text-align: center;
      padding: 48px 0 24px;
      width: 100%;
      max-width: 420px;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── ID Input ───────────────────────────── */
    .id-section {
      width: 100%;
      max-width: 420px;
      margin-bottom: 24px;
    }

    .id-input-row {
      display: flex;
      gap: 8px;
    }

    .id-input-row input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .id-input-row input:focus {
      border-color: var(--accent);
    }

    .id-input-row button {
      padding: 0 24px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .id-input-row button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    /* ── Dashboard Card ─────────────────────── */
    .dashboard {
      width: 100%;
      max-width: 420px;
      display: none;
      animation: fadeUp 0.5s ease-out;
    }

    .dashboard.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(102,126,234,0.2), transparent);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      pointer-events: none;
    }

    .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .budget-big {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .budget-big.positive { color: var(--success); }
    .budget-big.warning  { color: var(--warning); }
    .budget-big.negative { color: var(--danger); }

    .budget-detail {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Stats Grid ─────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .stat-card .stat-num {
      font-size: 1.6rem;
      font-weight: 800;
    }

    .stat-card .stat-name {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── Last Update ────────────────────────── */
    .last-update {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 16px 0;
    }

    /* ── Error / Loading ────────────────────── */
    .status-msg {
      text-align: center;
      padding: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .status-msg.error { color: var(--danger); }

    /* ── Auto-refresh badge ──────────────────── */
    .refresh-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-alt);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Footer ─────────────────────────────── */
    footer {
      margin-top: auto;
      padding: 32px 0;
      text-align: center;
      font-size: 0.6rem;
      color: var(--text-muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔥 SocialFine</h1>
    <p class="subtitle">Cross-device accountability dashboard</p>
  </div>

  <!-- ─── Device ID Input ──────────────────── -->
  <div class="id-section">
    <div class="id-input-row">
      <input type="text" id="deviceInput" placeholder="Paste your Device ID here…">
      <button id="loadBtn">View</button>
    </div>
  </div>

  <!-- ─── Dashboard ────────────────────────── -->
  <div class="dashboard" id="dashboard">

    <div class="refresh-badge">
      <span class="refresh-dot"></span>
      Live · Auto-refreshes every 30s
    </div>

    <!-- Budget Card -->
    <div class="card">
      <div class="card-label">Remaining Budget</div>
      <div class="budget-big" id="budgetBig">—</div>
      <div class="budget-detail" id="budgetDetail"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="dViolations">0</div>
        <div class="stat-name">Violations</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="dFined">$0</div>
        <div class="stat-name">Total Fined</div>
      </div>
    </div>

    <div class="last-update" id="lastUpdate"></div>
  </div>

  <!-- ─── Status message area ──────────────── -->
  <div class="status-msg" id="statusMsg"></div>

  <footer>SocialFine v1.2.6 · View-Only Dashboard · No PII stored</footer>

  <script src="app.js"></script>

</body>
</html>
